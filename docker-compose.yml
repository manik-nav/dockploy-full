services:
  web:
    build: ./web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN:-test.intillo.com}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=80"

  api:
    build: ./api/api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
